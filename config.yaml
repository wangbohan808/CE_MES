# use_mes： 1 使用海能和安克mes，2 使用海能mes，3 使用安克mes
# debug_sn: Testsn001 mes调试用sn码；量产，此sn为空 " "
# test_tool: 指测试工具名称和编码(自定义)


device_type: "050"

# #[RV30-PROTO] 基站050 实时判据：全为 0 表示该项不参与比较（调优见 test.py rv30_proto_yaml_realtime_ok）
# #[RV30-PROTO-68-MOD] 治具发 0x68 后会覆盖下列 rv30_* 运行时阈值（见 rv30_proto_parse_68_dat）
rv30_charge_Hmin: 0
rv30_charge_Lmin: 100
rv30_charge_Hmax: 0
rv30_charge_Lmax: 200
rv30_suction_10pa_Hmin: 3
rv30_suction_10pa_Lmin: 32
rv30_suction_10pa_Hmax: 7
rv30_suction_10pa_Lmax: 208
rv30_freq_min: 50
rv30_freq_max: 50
rv30_ir_l: 80
rv30_ir_lc: 68
rv30_ir_rc: 66
rv30_ir_r: 72
rv30_dust_bag_expected: 3
rv30_led_expected: 3
mcu_version: 005.001.029


use_mes: "2"
# 指定串口，当字符为空(user_com: "")，自动获取当前串口（需唯一）  COMx
user_com: ""
# 配件纸盒SN头，仅适用于，103,配件纸盒条码检测工具,固定7位
parts_sn_head: "2242G06"
project_name: "RV30"
#parts_sn_head: ""

# [WEIGH-106] 称重工位 device_type: "106" 时可选（默认见 test.LoadCfg）：
# weight_min_kg: 100
# weight_max_kg: 150
weight_read_delay_sec: 1
weight_read_timeout_sec: 20
weigh_scheme: "2"   # "1" 全程固定限；"2" 前 weigh_pass_first_n 台直通后仅 μ±σ
weigh_pass_first_n: 5
# 方案二历史重量 JSON：绝对路径或相对 exe/工作目录；不存在则自动创建 {"weights":[]}；损坏/读失败仍按空历史
weigh_history_json_path: "weigh_106_history_test.json"